/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:       #0a0a0f;
  --surface:  #12121a;
  --surface2: #1a1a28;
  --accent:   #7c3aed;
  --accent2:  #a855f7;
  --accent3:  #c084fc;
  --text:     #e2d9f3;
  --muted:    #7c6fa0;
  --border:   #2a2040;
  --danger:   #ef4444;
  --success:  #22c55e;
}
body.light {
  --bg:      #f0f0f8;
  --surface: #ffffff;
  --surface2:#e8e8f5;
  --text:    #1a1a2e;
  --muted:   #6b6b8a;
  --border:  #d0d0e8;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  transition: background .3s, color .3s;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(124,58,237,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(168,85,247,.06) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
button { font-family: 'Syne', sans-serif; cursor: pointer; }
input, button { border: none; outline: none; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ═══════════════════════════════════════════
   CONSENT PAGE
═══════════════════════════════════════════ */
#pg-consent {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.consent-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 24px;
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column;
  align-items: center; gap: 18px;
  text-align: center;
}
.consent-logo {
  width: 80px; height: 80px;
  border-radius: 18px; object-fit: cover;
  box-shadow: 0 8px 32px rgba(124,58,237,.4);
}
.consent-logo-placeholder {
  width: 80px; height: 80px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(124,58,237,.4);
}
.consent-box h1 {
  font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, #fff, #c084fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.consent-box p { font-size: 13px; color: var(--muted); line-height: 1.6; }
.consent-links { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.consent-links button {
  display: block; width: 100%;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--accent3);
  font-size: 14px; font-weight: 600;
  text-align: left;
}
.consent-links button:active { background: rgba(124,58,237,.15); border-color: var(--accent); }
